# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Dependencias de npm (para el código JS de la extensión)
  - package-ecosystem: "npm"
    directory: "/" # Ruta donde está el package.json
    schedule:
      interval: "weekly" # Puede ser daily, weekly o monthly
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Dependencias del sistema (si usas scripts de compilación en GitHub Actions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"
      - "ci"

  # Dependencias de Python (solo si usas scripts Python en tu build o test)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "pip"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "requests"
        update-types: ["version-update:semver-major"]
